```yaml
name: Java CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        run: mvn test

      - name: Build demo classes
        run: bash build.sh

      - name: Run demo script
        run: bash run.sh examples/th17_demo.icirc
```
